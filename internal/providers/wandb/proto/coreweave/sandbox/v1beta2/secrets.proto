syntax = "proto3";

package coreweave.sandbox.v1beta2;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/coreweave/sandbox/api/coreweave/sandbox/v1beta2;sandboxv1beta2";

// -----------------------------------------------------------------------------
// Secrets (v1beta2)
// -----------------------------------------------------------------------------
// This file defines messages for secret management in sandboxes.
// SecretStoreReference and SecretMapping are used in StartSandboxRequest to
// specify which secrets to inject. ResolvedSecret carries resolved values in
// PlacementRequest from Gateway to Runner.
//
// SecretStore and SecretStoreService provide CRUD for org-level secret store
// configurations that define how to connect to external providers.
//
// Field numbers MUST remain stable for wire compatibility.
// -----------------------------------------------------------------------------

// SecretStoreReference groups secret mappings by store name.
// Clients include these in StartSandboxRequest to request secret injection.
message SecretStoreReference {
  // Name of a configured secret store (resolved server-side).
  string store_name = 1;

  // Secrets to fetch from this store and inject into the sandbox.
  repeated SecretMapping secrets = 2;
}

// SecretMapping maps a provider-specific secret path to an environment variable.
message SecretMapping {
  // Provider-specific secret identifier (e.g., "HF_TOKEN", "secret/data/myapp/db").
  string path = 1;

  // Optional field within a structured secret (for key-value secrets).
  string field = 2;

  // Environment variable name for delivery into the sandbox container.
  string env_var = 3;
}

// ResolvedSecret is a fully-resolved secret ready for delivery to Runner.
// Included in PlacementRequest after Gateway resolves all secrets from providers.
// Secret values MUST NOT be logged, cached, or persisted outside of memory.
message ResolvedSecret {
  // Target environment variable name.
  string env_var = 1;

  // Raw secret value. Treated as opaque bytes.
  bytes value = 2;
}

// -----------------------------------------------------------------------------
// Secret Store Configuration
// -----------------------------------------------------------------------------

// SecretStoreProviderType enumerates supported secret store provider backends.
enum SecretStoreProviderType {
  SECRET_STORE_PROVIDER_TYPE_UNSPECIFIED = 0;
  SECRET_STORE_PROVIDER_TYPE_WANDB = 1;
}

// WandBStoreConfig holds configuration for a Weights & Biases secret store.
message WandBStoreConfig {
  // Base URL for the W&B API (e.g., "https://api.wandb.ai").
  string api_url = 1;

  // Optional W&B team/entity scope.
  string team = 2;

  // Field 3 was audience (removed — W&B Gorilla does not yet support audience-scoped exchange).
  reserved 3;
  reserved "audience";
}

// SecretStore represents an org-level secret store configuration.
// Stores define connections to external secrets providers (W&B, AWS, GCP, etc.).
message SecretStore {
  // Server-generated unique identifier.
  string id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Organization that owns this store (from auth context).
  string organization_id = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // User-provided name, unique within the organization.
  // Must match pattern: ^[a-z][a-z0-9-]{2,62}$
  string name = 3;

  // Provider type.
  SecretStoreProviderType provider_type = 4;

  // Provider-specific configuration.
  oneof provider_config {
    WandBStoreConfig wandb = 10;
  }

  // Server-generated timestamps.
  google.protobuf.Timestamp created_at = 20 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp updated_at = 21 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// -----------------------------------------------------------------------------
// SecretStore CRUD Messages
// -----------------------------------------------------------------------------

message CreateSecretStoreRequest {
  // Store name, unique within the organization.
  string name = 1 [(google.api.field_behavior) = REQUIRED];

  // Provider type.
  SecretStoreProviderType provider_type = 2 [(google.api.field_behavior) = REQUIRED];

  // Provider-specific configuration.
  oneof provider_config {
    WandBStoreConfig wandb = 10;
  }
}

message CreateSecretStoreResponse {
  SecretStore secret_store = 1;
}

message GetSecretStoreRequest {
  // Name of the secret store to retrieve.
  string name = 1 [(google.api.field_behavior) = REQUIRED];
}

message GetSecretStoreResponse {
  SecretStore secret_store = 1;
}

message ListSecretStoresRequest {
  // Maximum number of stores to return. Default 50, max 100.
  int32 page_size = 1;

  // Pagination token from a previous ListSecretStores response.
  string page_token = 2;
}

message ListSecretStoresResponse {
  repeated SecretStore secret_stores = 1;

  // Token for retrieving the next page. Empty if no more results.
  string next_page_token = 2;
}

message DeleteSecretStoreRequest {
  // Name of the secret store to delete.
  string name = 1 [(google.api.field_behavior) = REQUIRED];
}

message DeleteSecretStoreResponse {}

// -----------------------------------------------------------------------------
// SecretStoreService
// -----------------------------------------------------------------------------
// Manages org-level secret store configurations. Organization is derived from
// the caller's auth context (not the URL path).

service SecretStoreService {
  // CreateSecretStore registers a new secret store for the caller's organization.
  rpc CreateSecretStore(CreateSecretStoreRequest) returns (CreateSecretStoreResponse) {
    option (google.api.http) = {
      post: "/v1beta2/secretstores"
      body: "*"
    };
  }

  // GetSecretStore retrieves a secret store by name.
  rpc GetSecretStore(GetSecretStoreRequest) returns (GetSecretStoreResponse) {
    option (google.api.http) = {get: "/v1beta2/secretstores/{name}"};
  }

  // ListSecretStores lists secret stores for the caller's organization.
  rpc ListSecretStores(ListSecretStoresRequest) returns (ListSecretStoresResponse) {
    option (google.api.http) = {get: "/v1beta2/secretstores"};
  }

  // DeleteSecretStore removes a secret store by name.
  rpc DeleteSecretStore(DeleteSecretStoreRequest) returns (DeleteSecretStoreResponse) {
    option (google.api.http) = {delete: "/v1beta2/secretstores/{name}"};
  }
}
