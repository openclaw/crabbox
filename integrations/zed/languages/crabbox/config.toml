name = "Crabbox"
grammar = "yaml"
path_suffixes = ["crabbox.yaml", ".crabbox.yaml"]
line_comments = ["# "]
tab_size = 2
hard_tabs = false
word_characters = ["-", "_"]
brackets = [
  { start = "[", end = "]", close = true, newline = false },
  { start = "{", end = "}", close = true, newline = false },
  { start = "\"", end = "\"", close = true, newline = false },
  { start = "'", end = "'", close = true, newline = false },
]
