# XcodeGen spec for the Crabbox iOS app.
#
# Generate the project with:   xcodegen generate
#
# Design notes:
# - The cross-platform "brain" (CrabboxKit) lives in the local SwiftPM package at
#   the repo root ('.'). We depend on its `CrabboxKit` product so the app drives the
#   EXACT same URL/navigation/state logic that the headless e2e runner exercises.
# - The on-device LLM stack (MLX) is added below as a real package dependency. The
#   app is written with `#if canImport(MLXLLM)` guards so it still builds and runs
#   WITHOUT MLX resolved (e.g. on a machine that hasn't fetched the package, or for
#   App Store builds that ship without on-device inference). See the TODO note.
name: Crabbox

options:
  bundleIdPrefix: sh.crabbox
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # We ship a hand-authored Info.plist (App/Info.plist) rather than letting
    # Xcode synthesize one, so we can pin ATS to HTTPS-only for Guideline 2.5.
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad

configs:
  Debug: debug
  Release: release

packages:
  # The local CrabboxKit package (repo root). XcodeGen resolves the package at the
  # given path and we link its `CrabboxKit` product below.
  CrabboxKit:
    path: .

  # On-device LLM via Apple's MLX Swift libraries. The LLM/VLM libraries now live in
  # the reusable-libraries repo `ml-explore/mlx-swift-lm` (v3.31.3). We link the
  # MLXLLM + MLXLMCommon products. If you do not want on-device inference, remove the
  # `MLXLLM`/`MLXLMCommon` entries from `dependencies:` below and the app still builds
  # thanks to the `#if canImport(MLXLLM)` guards in the Assistant engine code.
  #
  # TODO(optional): if package resolution is unavailable in your environment, comment
  # out this `MLX` block and the two MLX product dependencies in the app target — the
  # app compiles and runs without it (on-device engine simply reports isReady()==false).
  # Enable on-device inference by uncommenting this block AND the two MLX product
  # dependencies in the target below, then `xcodegen generate`. Left off by
  # default so CI (and a fresh clone) builds without resolving the large MLX
  # package; the Assistant's on-device engine reports isReady()==false until then.
  # MLX:
  #   url: https://github.com/ml-explore/mlx-swift-lm
  #   from: "3.31.3"

targets:
  Crabbox:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.crabbox.Crabbox
        PRODUCT_NAME: Crabbox
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        HEADER_SEARCH_PATHS: "$(inherited) $(DERIVED_FILE_DIR)/crabboxmobile"
        LIBRARY_SEARCH_PATHS: "$(inherited) $(DERIVED_FILE_DIR)/crabboxmobile"
        SWIFT_INCLUDE_PATHS: "$(inherited) $(DERIVED_FILE_DIR)/crabboxmobile"
        # -lresolv IS required: the Go c-archive's cgo DNS resolver references
        # _res_9_ninit/_nclose/_nsearch, which are exported by the iOS SDK's
        # libresolv.9.tbd (verified present on iPhoneOS.sdk). Dropping it breaks
        # the device link ("Undefined symbols: _res_9_*"). Keeping the cgo
        # resolver (vs a netgo pure-Go build) also keeps DNS working inside the
        # iOS sandbox, which has no /etc/resolv.conf for the pure-Go resolver.
        OTHER_LDFLAGS: "$(inherited) -lcrabboxmobile -framework Security -framework CoreFoundation -lresolv"
        # MLX uses Metal; bound memory growth on device with these (harmless on Sim).
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - name: Build CrabboxMobile Go Core
        basedOnDependencyAnalysis: false
        script: |
          "$SRCROOT/scripts/build-crabbox-mobile-core.sh" "$DERIVED_FILE_DIR/crabboxmobile"
    dependencies:
      - package: CrabboxKit
        product: CrabboxKit
      # --- On-device MLX (optional; uncomment with the MLX package above) ----
      # - package: MLX
      #   product: MLXLLM
      # - package: MLX
      #   product: MLXLMCommon
