version: 2

project_name: crabbox

changelog:
  disable: true

builds:
  - id: crabbox
    main: ./cmd/crabbox
    binary: crabbox
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/openclaw/crabbox/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: crabbox-apple-vz-helper
    main: ./cmd/crabbox-apple-vz-helper
    binary: crabbox-apple-vz-helper
    env:
      - CGO_ENABLED=1
      - CGO_CFLAGS=-mmacosx-version-min=13.0
      - CGO_LDFLAGS=-mmacosx-version-min=13.0
      - MACOSX_DEPLOYMENT_TARGET=13.0
    targets:
      - darwin_arm64

archives:
  - id: crabbox
    ids:
      - crabbox
      - crabbox-apple-vz-helper
    allow_different_binary_count: true
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

brews:
  - name: crabbox
    ids:
      - crabbox
    repository:
      owner: openclaw
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: openclaw-bot
      email: bot@openclaw.ai
    commit_msg_template: "brew: update crabbox to {{ .Tag }}"
    homepage: https://github.com/openclaw/crabbox
    description: Remote Linux test boxes for dirty worktrees and CI hydration
    license: MIT
    install: |
      bin.install "crabbox"
      bin.install "crabbox-apple-vz-helper" if OS.mac? && Hardware::CPU.arm?
    test: |
      system bin/"crabbox", "--version"
