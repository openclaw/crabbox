name: Live Provider E2E

on:
  workflow_dispatch:
    inputs:
      providers:
        description: "Comma-separated providers to run, or all"
        required: true
        default: "all"
        type: string
      allow_missing:
        description: "Skip providers that are missing configured secrets"
        required: true
        default: true
        type: boolean
      sync_checkout:
        description: "Exercise Crabbox sync during run smoke tests"
        required: true
        default: false
        type: boolean
      smoke_repo:
        description: "Repo path to use as the smoke workload"
        required: true
        default: "."
        type: string
      runner_label:
        description: "GitHub runner label for provider jobs"
        required: true
        default: "ubuntu-latest"
        type: string

permissions:
  contents: read

env:
  GOFLAGS: -mod=readonly -trimpath
  GOTOOLCHAIN: local

jobs:
  matrix:
    name: Provider Matrix
    runs-on: ubuntu-latest
    outputs:
      providers: ${{ steps.providers.outputs.providers }}

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build provider list
        id: providers
        shell: bash
        run: |
          set -euo pipefail
          entries="$(go run ./cmd/crabbox providers --json)"
          providers="$(
            jq -c -n --arg raw "${{ inputs.providers }}" --argjson entries "$entries" '
              def trim: gsub("^\\s+|\\s+$"; "");
              def aliases:
                ($entries | map({key: .provider, value: .provider}))
                + ($entries | map(. as $p | (.aliases // [])[] | {key: ., value: $p.provider}))
                | from_entries;
              def canon($aliases):
                if . == "docker" or . == "container" then "local-container"
                elif . == "blacksmith" then "blacksmith-testbox"
                elif . == "namespace" then "namespace-devbox"
                elif . == "static" or . == "static-ssh" then "ssh"
                elif . == "cf" then "cloudflare"
                else . end
                | . as $name
                | ($aliases[$name] // error("unknown provider: " + $name));
              ($raw | ascii_downcase | trim) as $input
              | (aliases) as $aliases
              | if $input == "all" or $input == "" then ($entries | map(.provider))
                else
                  $input
                  | split(",")
                  | map(trim | canon($aliases))
                  | map(select(length > 0))
                  | unique
                end
            '
          )"
          echo "providers=$providers" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$providers"

  provider-e2e:
    name: ${{ matrix.provider }}
    needs: matrix
    if: ${{ needs.matrix.outputs.providers != '[]' }}
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        provider: ${{ fromJSON(needs.matrix.outputs.providers) }}

    env:
      CRABBOX_BIN: ${{ github.workspace }}/bin/crabbox
      CRABBOX_LIVE: "1"
      CRABBOX_LIVE_REPO: ${{ inputs.smoke_repo }}
      CRABBOX_LIVE_SKIP_MISSING: ${{ inputs.allow_missing && '1' || '0' }}
      CRABBOX_PROVIDER_E2E_SYNC: ${{ inputs.sync_checkout && '1' || '0' }}
      CRABBOX_PROVIDER_E2E_LOG_DIR: ${{ github.workspace }}/.crabbox/live-provider-e2e

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install common tools
        if: ${{ inputs.runner_label == 'ubuntu-latest' || startsWith(inputs.runner_label, 'ubuntu-') }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Write secret files
        shell: bash
        env:
          CRABBOX_SSH_PRIVATE_KEY: ${{ contains(fromJSON('["aws","azure","gcp","hetzner","proxmox","parallels","ssh","exe-dev","runpod"]'), matrix.provider) && secrets.CRABBOX_SSH_PRIVATE_KEY || '' }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ matrix.provider == 'gcp' && secrets.GCP_SERVICE_ACCOUNT_JSON || '' }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh" "$RUNNER_TEMP/crabbox"
          chmod 700 "$HOME/.ssh"
          if [[ -n "${CRABBOX_SSH_PRIVATE_KEY:-}" ]]; then
            key="$RUNNER_TEMP/crabbox/id_provider_e2e"
            printf '%s\n' "$CRABBOX_SSH_PRIVATE_KEY" > "$key"
            chmod 600 "$key"
            echo "CRABBOX_SSH_KEY=$key" >> "$GITHUB_ENV"
          fi
          if [[ -n "${GCP_SERVICE_ACCOUNT_JSON:-}" ]]; then
            creds="$RUNNER_TEMP/crabbox/gcp-service-account.json"
            printf '%s' "$GCP_SERVICE_ACCOUNT_JSON" > "$creds"
            chmod 600 "$creds"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$creds" >> "$GITHUB_ENV"
          fi

      - name: Build Crabbox
        run: go build -trimpath -o "$CRABBOX_BIN" ./cmd/crabbox

      - name: Run provider smoke
        shell: bash
        env:
          CRABBOX_COORDINATOR: ${{ contains(fromJSON('["aws","azure","gcp","hetzner"]'), matrix.provider) && secrets.CRABBOX_COORDINATOR || '' }}
          CRABBOX_COORDINATOR_TOKEN: ${{ contains(fromJSON('["aws","azure","gcp","hetzner"]'), matrix.provider) && secrets.CRABBOX_COORDINATOR_TOKEN || '' }}
          AWS_ACCESS_KEY_ID: ${{ matrix.provider == 'aws' && secrets.AWS_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ matrix.provider == 'aws' && secrets.AWS_SECRET_ACCESS_KEY || '' }}
          AWS_SESSION_TOKEN: ${{ matrix.provider == 'aws' && secrets.AWS_SESSION_TOKEN || '' }}
          AWS_REGION: ${{ matrix.provider == 'aws' && secrets.AWS_REGION || '' }}
          CRABBOX_AWS_REGION: ${{ matrix.provider == 'aws' && secrets.CRABBOX_AWS_REGION || '' }}
          AZURE_SUBSCRIPTION_ID: ${{ contains(fromJSON('["azure","azure-dynamic-sessions"]'), matrix.provider) && secrets.AZURE_SUBSCRIPTION_ID || '' }}
          AZURE_TENANT_ID: ${{ contains(fromJSON('["azure","azure-dynamic-sessions"]'), matrix.provider) && secrets.AZURE_TENANT_ID || '' }}
          AZURE_CLIENT_ID: ${{ contains(fromJSON('["azure","azure-dynamic-sessions"]'), matrix.provider) && secrets.AZURE_CLIENT_ID || '' }}
          AZURE_CLIENT_SECRET: ${{ contains(fromJSON('["azure","azure-dynamic-sessions"]'), matrix.provider) && secrets.AZURE_CLIENT_SECRET || '' }}
          CRABBOX_AZURE_LOCATION: ${{ matrix.provider == 'azure' && secrets.CRABBOX_AZURE_LOCATION || '' }}
          CRABBOX_AZURE_RESOURCE_GROUP: ${{ matrix.provider == 'azure' && secrets.CRABBOX_AZURE_RESOURCE_GROUP || '' }}
          CRABBOX_AZURE_DYNAMIC_SESSIONS_TOKEN: ${{ matrix.provider == 'azure-dynamic-sessions' && secrets.CRABBOX_AZURE_DYNAMIC_SESSIONS_TOKEN || '' }}
          CRABBOX_AZURE_DYNAMIC_SESSIONS_ENDPOINT: ${{ matrix.provider == 'azure-dynamic-sessions' && secrets.CRABBOX_AZURE_DYNAMIC_SESSIONS_ENDPOINT || '' }}
          CRABBOX_AZURE_DYNAMIC_SESSIONS_POOL: ${{ matrix.provider == 'azure-dynamic-sessions' && secrets.CRABBOX_AZURE_DYNAMIC_SESSIONS_POOL || '' }}
          GOOGLE_CLOUD_PROJECT: ${{ matrix.provider == 'gcp' && secrets.GOOGLE_CLOUD_PROJECT || '' }}
          GCP_PROJECT_ID: ${{ matrix.provider == 'gcp' && secrets.GCP_PROJECT_ID || '' }}
          CRABBOX_GCP_ZONE: ${{ matrix.provider == 'gcp' && secrets.CRABBOX_GCP_ZONE || '' }}
          HCLOUD_TOKEN: ${{ matrix.provider == 'hetzner' && secrets.HCLOUD_TOKEN || '' }}
          HETZNER_TOKEN: ${{ matrix.provider == 'hetzner' && secrets.HETZNER_TOKEN || '' }}
          CRABBOX_PROXMOX_API_URL: ${{ matrix.provider == 'proxmox' && secrets.CRABBOX_PROXMOX_API_URL || '' }}
          CRABBOX_PROXMOX_TOKEN_ID: ${{ matrix.provider == 'proxmox' && secrets.CRABBOX_PROXMOX_TOKEN_ID || '' }}
          CRABBOX_PROXMOX_TOKEN_SECRET: ${{ matrix.provider == 'proxmox' && secrets.CRABBOX_PROXMOX_TOKEN_SECRET || '' }}
          CRABBOX_PROXMOX_NODE: ${{ matrix.provider == 'proxmox' && secrets.CRABBOX_PROXMOX_NODE || '' }}
          CRABBOX_PROXMOX_TEMPLATE_ID: ${{ matrix.provider == 'proxmox' && secrets.CRABBOX_PROXMOX_TEMPLATE_ID || '' }}
          CRABBOX_PROXMOX_STORAGE: ${{ matrix.provider == 'proxmox' && secrets.CRABBOX_PROXMOX_STORAGE || '' }}
          CRABBOX_PROXMOX_BRIDGE: ${{ matrix.provider == 'proxmox' && secrets.CRABBOX_PROXMOX_BRIDGE || '' }}
          CRABBOX_PROXMOX_USER: ${{ matrix.provider == 'proxmox' && secrets.CRABBOX_PROXMOX_USER || '' }}
          CRABBOX_PROXMOX_INSECURE_TLS: ${{ matrix.provider == 'proxmox' && secrets.CRABBOX_PROXMOX_INSECURE_TLS || '' }}
          CRABBOX_PARALLELS_SOURCE: ${{ matrix.provider == 'parallels' && secrets.CRABBOX_PARALLELS_SOURCE || '' }}
          CRABBOX_PARALLELS_SOURCE_SNAPSHOT: ${{ matrix.provider == 'parallels' && secrets.CRABBOX_PARALLELS_SOURCE_SNAPSHOT || '' }}
          CRABBOX_PARALLELS_TEMPLATE: ${{ matrix.provider == 'parallels' && secrets.CRABBOX_PARALLELS_TEMPLATE || '' }}
          CRABBOX_PARALLELS_HOST: ${{ matrix.provider == 'parallels' && secrets.CRABBOX_PARALLELS_HOST || '' }}
          CRABBOX_PARALLELS_HOST_USER: ${{ matrix.provider == 'parallels' && secrets.CRABBOX_PARALLELS_HOST_USER || '' }}
          CRABBOX_PARALLELS_USER: ${{ matrix.provider == 'parallels' && secrets.CRABBOX_PARALLELS_USER || '' }}
          CRABBOX_PARALLELS_WORK_ROOT: ${{ matrix.provider == 'parallels' && secrets.CRABBOX_PARALLELS_WORK_ROOT || '' }}
          CRABBOX_STATIC_HOST: ${{ matrix.provider == 'ssh' && secrets.CRABBOX_STATIC_HOST || '' }}
          CRABBOX_STATIC_USER: ${{ matrix.provider == 'ssh' && secrets.CRABBOX_STATIC_USER || '' }}
          CRABBOX_STATIC_PORT: ${{ matrix.provider == 'ssh' && secrets.CRABBOX_STATIC_PORT || '' }}
          CRABBOX_STATIC_WORK_ROOT: ${{ matrix.provider == 'ssh' && secrets.CRABBOX_STATIC_WORK_ROOT || '' }}
          CRABBOX_TARGET: ${{ matrix.provider == 'ssh' && secrets.CRABBOX_TARGET || '' }}
          CRABBOX_WINDOWS_MODE: ${{ matrix.provider == 'ssh' && secrets.CRABBOX_WINDOWS_MODE || '' }}
          CRABBOX_EXE_DEV_CONTROL_HOST: ${{ matrix.provider == 'exe-dev' && secrets.CRABBOX_EXE_DEV_CONTROL_HOST || '' }}
          CRABBOX_EXE_DEV_IMAGE: ${{ matrix.provider == 'exe-dev' && secrets.CRABBOX_EXE_DEV_IMAGE || '' }}
          CRABBOX_BLACKSMITH_ORG: ${{ matrix.provider == 'blacksmith-testbox' && secrets.CRABBOX_BLACKSMITH_ORG || '' }}
          CRABBOX_BLACKSMITH_WORKFLOW: ${{ matrix.provider == 'blacksmith-testbox' && secrets.CRABBOX_BLACKSMITH_WORKFLOW || '' }}
          CRABBOX_BLACKSMITH_JOB: ${{ matrix.provider == 'blacksmith-testbox' && secrets.CRABBOX_BLACKSMITH_JOB || '' }}
          CRABBOX_BLACKSMITH_REF: ${{ matrix.provider == 'blacksmith-testbox' && secrets.CRABBOX_BLACKSMITH_REF || '' }}
          BLACKSMITH_API_TOKEN: ${{ matrix.provider == 'blacksmith-testbox' && secrets.BLACKSMITH_API_TOKEN || '' }}
          CRABBOX_NAMESPACE_IMAGE: ${{ matrix.provider == 'namespace-devbox' && secrets.CRABBOX_NAMESPACE_IMAGE || '' }}
          CRABBOX_NAMESPACE_SIZE: ${{ matrix.provider == 'namespace-devbox' && secrets.CRABBOX_NAMESPACE_SIZE || '' }}
          CRABBOX_NAMESPACE_REPOSITORY: ${{ matrix.provider == 'namespace-devbox' && secrets.CRABBOX_NAMESPACE_REPOSITORY || '' }}
          CRABBOX_NAMESPACE_SITE: ${{ matrix.provider == 'namespace-devbox' && secrets.CRABBOX_NAMESPACE_SITE || '' }}
          CRABBOX_NAMESPACE_DELETE_ON_RELEASE: ${{ matrix.provider == 'namespace-devbox' && secrets.CRABBOX_NAMESPACE_DELETE_ON_RELEASE || '' }}
          CRABBOX_SEMAPHORE_HOST: ${{ matrix.provider == 'semaphore' && secrets.CRABBOX_SEMAPHORE_HOST || '' }}
          CRABBOX_SEMAPHORE_PROJECT: ${{ matrix.provider == 'semaphore' && secrets.CRABBOX_SEMAPHORE_PROJECT || '' }}
          CRABBOX_SEMAPHORE_TOKEN: ${{ matrix.provider == 'semaphore' && secrets.CRABBOX_SEMAPHORE_TOKEN || '' }}
          CRABBOX_SPRITES_TOKEN: ${{ matrix.provider == 'sprites' && secrets.CRABBOX_SPRITES_TOKEN || '' }}
          CRABBOX_DAYTONA_SNAPSHOT: ${{ matrix.provider == 'daytona' && secrets.CRABBOX_DAYTONA_SNAPSHOT || '' }}
          DAYTONA_API_KEY: ${{ matrix.provider == 'daytona' && secrets.DAYTONA_API_KEY || '' }}
          DAYTONA_JWT_TOKEN: ${{ matrix.provider == 'daytona' && secrets.DAYTONA_JWT_TOKEN || '' }}
          DAYTONA_ORGANIZATION_ID: ${{ matrix.provider == 'daytona' && secrets.DAYTONA_ORGANIZATION_ID || '' }}
          ISLO_API_KEY: ${{ matrix.provider == 'islo' && secrets.ISLO_API_KEY || '' }}
          CRABBOX_E2B_API_KEY: ${{ matrix.provider == 'e2b' && secrets.CRABBOX_E2B_API_KEY || '' }}
          E2B_API_KEY: ${{ matrix.provider == 'e2b' && secrets.E2B_API_KEY || '' }}
          MODAL_TOKEN_ID: ${{ matrix.provider == 'modal' && secrets.MODAL_TOKEN_ID || '' }}
          MODAL_TOKEN_SECRET: ${{ matrix.provider == 'modal' && secrets.MODAL_TOKEN_SECRET || '' }}
          CRABBOX_UPSTASH_BOX_API_KEY: ${{ matrix.provider == 'upstash-box' && secrets.CRABBOX_UPSTASH_BOX_API_KEY || '' }}
          UPSTASH_BOX_API_KEY: ${{ matrix.provider == 'upstash-box' && secrets.UPSTASH_BOX_API_KEY || '' }}
          CRABBOX_TENSORLAKE_API_KEY: ${{ matrix.provider == 'tensorlake' && secrets.CRABBOX_TENSORLAKE_API_KEY || '' }}
          TENSORLAKE_API_KEY: ${{ matrix.provider == 'tensorlake' && secrets.TENSORLAKE_API_KEY || '' }}
          TENSORLAKE_ORGANIZATION_ID: ${{ matrix.provider == 'tensorlake' && secrets.TENSORLAKE_ORGANIZATION_ID || '' }}
          TENSORLAKE_PROJECT_ID: ${{ matrix.provider == 'tensorlake' && secrets.TENSORLAKE_PROJECT_ID || '' }}
          CRABBOX_CLOUDFLARE_RUNNER_URL: ${{ matrix.provider == 'cloudflare' && secrets.CRABBOX_CLOUDFLARE_RUNNER_URL || '' }}
          CRABBOX_CLOUDFLARE_RUNNER_TOKEN: ${{ matrix.provider == 'cloudflare' && secrets.CRABBOX_CLOUDFLARE_RUNNER_TOKEN || '' }}
          CRABBOX_RAILWAY_API_TOKEN: ${{ matrix.provider == 'railway' && secrets.CRABBOX_RAILWAY_API_TOKEN || '' }}
          RAILWAY_API_TOKEN: ${{ matrix.provider == 'railway' && secrets.RAILWAY_API_TOKEN || '' }}
          CRABBOX_RAILWAY_SERVICE_ID: ${{ matrix.provider == 'railway' && secrets.CRABBOX_RAILWAY_SERVICE_ID || '' }}
          CRABBOX_RAILWAY_PROJECT_ID: ${{ matrix.provider == 'railway' && secrets.CRABBOX_RAILWAY_PROJECT_ID || '' }}
          CRABBOX_RAILWAY_ENVIRONMENT_ID: ${{ matrix.provider == 'railway' && secrets.CRABBOX_RAILWAY_ENVIRONMENT_ID || '' }}
          CRABBOX_RUNPOD_API_KEY: ${{ matrix.provider == 'runpod' && secrets.CRABBOX_RUNPOD_API_KEY || '' }}
          RUNPOD_API_KEY: ${{ matrix.provider == 'runpod' && secrets.RUNPOD_API_KEY || '' }}
          CRABBOX_RUNPOD_INSTANCE_ID: ${{ matrix.provider == 'runpod' && secrets.CRABBOX_RUNPOD_INSTANCE_ID || '' }}
          CRABBOX_RUNPOD_TEMPLATE_ID: ${{ matrix.provider == 'runpod' && secrets.CRABBOX_RUNPOD_TEMPLATE_ID || '' }}
          CRABBOX_WANDB_API_KEY: ${{ matrix.provider == 'wandb' && secrets.CRABBOX_WANDB_API_KEY || '' }}
          WANDB_API_KEY: ${{ matrix.provider == 'wandb' && secrets.WANDB_API_KEY || '' }}
          WANDB_ENTITY_NAME: ${{ matrix.provider == 'wandb' && secrets.WANDB_ENTITY_NAME || '' }}
          WANDB_PROJECT: ${{ matrix.provider == 'wandb' && secrets.WANDB_PROJECT || '' }}
          CRABBOX_ASCII_BOX_API_KEY: ${{ matrix.provider == 'ascii-box' && secrets.CRABBOX_ASCII_BOX_API_KEY || '' }}
          ASCII_BOX_API_KEY: ${{ matrix.provider == 'ascii-box' && secrets.ASCII_BOX_API_KEY || '' }}
          CRABBOX_ASCII_BOX_BASE_URL: ${{ matrix.provider == 'ascii-box' && secrets.CRABBOX_ASCII_BOX_BASE_URL || '' }}
          ASCII_BOX_BASE_URL: ${{ matrix.provider == 'ascii-box' && secrets.ASCII_BOX_BASE_URL || '' }}
          CRABBOX_ASCII_BOX_CLI: ${{ matrix.provider == 'ascii-box' && secrets.CRABBOX_ASCII_BOX_CLI || '' }}
          CRABBOX_SMOLVM_API_KEY: ${{ matrix.provider == 'smolvm' && secrets.CRABBOX_SMOLVM_API_KEY || '' }}
          SMOLMACHINES_API_KEY: ${{ matrix.provider == 'smolvm' && secrets.SMOLMACHINES_API_KEY || '' }}
          SMK_API_KEY: ${{ matrix.provider == 'smolvm' && secrets.SMK_API_KEY || '' }}
        run: |
          set -euo pipefail
          mkdir -p "$CRABBOX_PROVIDER_E2E_LOG_DIR"
          log="$CRABBOX_PROVIDER_E2E_LOG_DIR/${{ matrix.provider }}.log"
          scripts/live-provider-e2e.sh "${{ matrix.provider }}" 2>&1 | tee "$log"

      - name: Upload provider log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: live-provider-e2e-${{ matrix.provider }}
          path: .crabbox/live-provider-e2e/${{ matrix.provider }}.log
          if-no-files-found: ignore
