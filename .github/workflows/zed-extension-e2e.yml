name: Zed Extension E2E

on:
  pull_request:
    paths:
      - "integrations/zed/**"
      - "scripts/check-zed-extension.mjs"
      - "scripts/test-zed-extension-e2e.mjs"
      - ".github/workflows/zed-extension-e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extension:
    name: Validate package and execute tasks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Validate registry package
        run: node scripts/check-zed-extension.mjs

      - name: Execute Zed task lifecycle
        run: node scripts/test-zed-extension-e2e.mjs
