name: Zed Extension E2E

on:
  pull_request:
    paths:
      - "integrations/zed/**"
      - "scripts/check-zed-extension.mjs"
      - "scripts/test-zed-extension-e2e.mjs"
      - ".github/workflows/zed-extension-e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  ZED_EXTENSION_CLI_SHA: 9ee3c503a4bbbc6b4a0f8a789acca4871d773223
  ZED_EXTENSION_CLI_SHA256: a6fca5ef11ff23f0ef8b03bd2453270591c9fc6c03700c3c92017e5082ada757

jobs:
  extension:
    name: Validate package and execute tasks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: "1.90"
          target: "wasm32-wasip2"

      - name: Validate registry package
        run: node scripts/check-zed-extension.mjs

      - name: Package with Zed's official extension compiler
        run: |
          wget --quiet "https://zed-extension-cli.nyc3.digitaloceanspaces.com/$ZED_EXTENSION_CLI_SHA/x86_64-unknown-linux-gnu/zed-extension"
          printf '%s  %s\n' "$ZED_EXTENSION_CLI_SHA256" zed-extension | sha256sum --check --strict -
          chmod +x zed-extension
          package_root="$RUNNER_TEMP/crabbox-zed-extension"
          mkdir -p "$package_root/output" "$package_root/scratch"
          ./zed-extension \
            --source-dir integrations/zed \
            --output-dir "$package_root/output" \
            --scratch-dir "$package_root/scratch"
          test -s "$package_root/output/archive.tar.gz"
          test -s "$package_root/output/manifest.json"

      - name: Execute Zed task lifecycle
        run: node scripts/test-zed-extension-e2e.mjs
