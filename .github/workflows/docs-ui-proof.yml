name: Docs UI Proof

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/build-docs-site.mjs"
      - "scripts/enhance-docs-site.mjs"
      - "scripts/enhance-docs-site.test.mjs"
      - ".github/workflows/docs-ui-proof.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    name: Render visual proof
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Build exact deployed docs output
        run: |
          node scripts/build-docs-site.mjs
          node scripts/enhance-docs-site.mjs
          node --test scripts/enhance-docs-site.test.mjs

      - name: Assert information architecture
        run: |
          page=dist/docs-site/features/index.html
          grep -q 'data-feature-explorer' "$page"
          grep -q 'Build locally' "$page"
          grep -q 'Choose a provider' "$page"
          grep -q 'Open command reference' "$page"

      - name: Install pinned browser
        run: npx --yes playwright@1.55.0 install --with-deps chromium

      - name: Render desktop, dark, and mobile proofs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ui-proof
          python3 -m http.server 4173 --directory dist/docs-site >/tmp/crabbox-docs-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          ready=0
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/features/ >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            cat /tmp/crabbox-docs-server.log
            exit 1
          fi
          npx --yes playwright@1.55.0 screenshot \
            --browser chromium \
            --viewport-size "1440,1100" \
            --full-page \
            http://127.0.0.1:4173/features/ \
            dist/ui-proof/features-desktop-light.png
          npx --yes playwright@1.55.0 screenshot \
            --browser chromium \
            --color-scheme dark \
            --viewport-size "1440,1100" \
            --full-page \
            http://127.0.0.1:4173/features/ \
            dist/ui-proof/features-desktop-dark.png
          npx --yes playwright@1.55.0 screenshot \
            --browser chromium \
            --viewport-size "390,844" \
            --full-page \
            http://127.0.0.1:4173/features/ \
            dist/ui-proof/features-mobile.png
          test -s dist/ui-proof/features-desktop-light.png
          test -s dist/ui-proof/features-desktop-dark.png
          test -s dist/ui-proof/features-mobile.png
          sha256sum dist/ui-proof/*.png > dist/ui-proof/SHA256SUMS

      - name: Upload reviewable proof artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: features-ui-proof-${{ github.event.pull_request.head.sha || github.sha }}
          path: dist/ui-proof
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
