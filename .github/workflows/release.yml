name: release

on:
  repository_dispatch:
    types: [release]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify Apple Silicon runner
        run: test "$(uname -m)" = arm64

      - name: Verify release source and tag
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_TAG: ${{ github.event.client_payload.tag }}
          WORKFLOW_REF: ${{ github.ref }}
        run: scripts/verify-release-source.sh

      - name: Stash current GoReleaser config
        run: cp .goreleaser.yaml /tmp/.goreleaser.yaml

      - name: Checkout release tag
        env:
          RELEASE_TAG: ${{ github.event.client_payload.tag }}
        run: git checkout --detach "refs/tags/$RELEASE_TAG"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release tag
        id: release
        env:
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
        run: |
          tag="$DISPATCH_TAG"
          if [ -z "$tag" ]; then
            echo "::error::could not resolve release tag"
            exit 1
          fi
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "version=${tag#v}" >>"$GITHUB_OUTPUT"

      - name: Verify Homebrew tap token
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_GITHUB_TOKEN is missing; cannot publish Homebrew formula"
            exit 1
          fi
          code="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $HOMEBREW_TAP_GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/openclaw/homebrew-tap || true)"
          if [ "$code" != "200" ]; then
            echo "::error::HOMEBREW_TAP_GITHUB_TOKEN cannot access openclaw/homebrew-tap (HTTP $code)"
            exit 1
          fi

      - name: Remove incomplete release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          release_json="$RUNNER_TEMP/release.json"
          status="$(curl -sS -o "$release_json" -w '%{http_code}' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG")"
          case "$status" in
            200) ;;
            404) exit 0 ;;
            *)
              echo "::error::could not inspect existing release $RELEASE_TAG (HTTP $status)"
              exit 1
              ;;
          esac
          if jq -r '.body // ""' "$release_json" | grep -q "^## $RELEASE_VERSION "; then
            echo "::error::release $RELEASE_TAG is already finalized; refusing to replace its artifacts"
            exit 1
          fi
          release_id="$(jq -r '.id' "$release_json")"
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$release_id"

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config /tmp/.goreleaser.yaml --parallelism 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Publish GitHub release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          notes="$(awk -v version="$RELEASE_VERSION" '
            $1 == "##" && $2 == version { in_section = 1 }
            in_section && $1 == "##" && $2 != version { exit }
            in_section { print }
          ' CHANGELOG.md)"
          if [ -z "$notes" ]; then
            echo "::error::CHANGELOG.md has no section for $RELEASE_VERSION"
            exit 1
          fi
          gh release edit "$RELEASE_TAG" --notes "$notes"
          body="$(gh release view "$RELEASE_TAG" --json body --jq '.body')"
          if ! grep -q "^## $RELEASE_VERSION " <<<"$body"; then
            echo "::error::GitHub release $RELEASE_TAG does not contain the $RELEASE_VERSION changelog"
            exit 1
          fi

      - name: Verify Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          formula="$(gh api repos/openclaw/homebrew-tap/contents/Formula/crabbox.rb --jq '.content' | base64 --decode)"
          if ! grep -q "version \"$RELEASE_VERSION\"" <<<"$formula"; then
            echo "::error::openclaw/homebrew-tap Formula/crabbox.rb was not updated to $RELEASE_VERSION"
            exit 1
          fi
          if ! grep -q "releases/download/v$RELEASE_VERSION/" <<<"$formula"; then
            echo "::error::openclaw/homebrew-tap Formula/crabbox.rb does not point at v$RELEASE_VERSION assets"
            exit 1
          fi
