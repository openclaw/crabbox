name: Verify Homebrew Release
run-name: Verify Homebrew ${{ inputs.tag }} from published run ${{ inputs.public_verifier_run_id }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Signed stable release tag
        required: true
        type: string
      tag_object:
        description: Signed annotated tag object SHA
        required: true
        type: string
      source_commit:
        description: Peeled release source commit SHA
        required: true
        type: string
      verifier_commit:
        description: Protected release verifier commit SHA
        required: true
        type: string
      release_id:
        description: Published GitHub release ID
        required: true
        type: string
      public_verifier_run_id:
        description: Successful published-asset verifier run ID
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  guard:
    name: guard-protected-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Guard published release and protected verifier run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_PROTECTED: ${{ github.ref_protected }}
          RELEASE_ID: ${{ inputs.release_id }}
          RELEASE_TAG: ${{ inputs.tag }}
          PUBLIC_VERIFIER_RUN_ID: ${{ inputs.public_verifier_run_id }}
          RUN_SHA: ${{ github.sha }}
          VERIFIER_COMMIT: ${{ inputs.verifier_commit }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]
          [[ "$VERIFIER_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$RELEASE_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$PUBLIC_VERIFIER_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          expected_ref="refs/heads/$DEFAULT_BRANCH"
          expected_workflow_ref="$GITHUB_REPOSITORY/.github/workflows/verify-homebrew.yml@$expected_ref"
          [[ "$REF_PROTECTED" == true ]]
          [[ "$GITHUB_REF" == "$expected_ref" ]]
          [[ "$GITHUB_WORKFLOW_REF" == "$expected_workflow_ref" ]]
          [[ "$WORKFLOW_SHA" == "$RUN_SHA" ]]

          work="$RUNNER_TEMP/homebrew-guard"
          mkdir -m 700 "$work"
          gh api --method GET "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" >"$work/release.json"
          gh api --method GET "repos/$GITHUB_REPOSITORY/actions/runs/$PUBLIC_VERIFIER_RUN_ID" \
            >"$work/run.json"
          workflow_id=$(jq -er '.workflow_id | select(type == "number" and . > 0)' "$work/run.json")
          gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/$workflow_id" \
            >"$work/workflow.json"
          jq -e \
            --argjson id "$RELEASE_ID" \
            --arg tag "$RELEASE_TAG" '
              .id == $id and .tag_name == $tag and .name == $tag and
              .draft == false and .prerelease == false and
              .immutable == true and
              (.published_at | type == "string")
            ' "$work/release.json" >/dev/null
          jq -e \
            --argjson id "$PUBLIC_VERIFIER_RUN_ID" \
            --arg branch "$DEFAULT_BRANCH" \
            --arg sha "$VERIFIER_COMMIT" '
              .id == $id and .event == "workflow_dispatch" and
              .status == "completed" and .conclusion == "success" and
              .head_branch == $branch and .head_sha == $sha and
              .repository.full_name == env.GITHUB_REPOSITORY and
              .head_repository.full_name == env.GITHUB_REPOSITORY
            ' "$work/run.json" >/dev/null
          jq -e '
            .path == ".github/workflows/release-assets.yml" and .state == "active"
          ' "$work/workflow.json" >/dev/null

  public-witness-preflight:
    name: freeze-anonymous-public-witness
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out protected Homebrew workflow tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Freeze anonymous public metadata before native execution
        shell: bash
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          PUBLIC_VERIFIER_RUN_ID: ${{ inputs.public_verifier_run_id }}
        run: |
          set -euo pipefail
          unset ACTIONS_ID_TOKEN_REQUEST_TOKEN ACTIONS_RUNTIME_TOKEN GH_TOKEN GITHUB_TOKEN
          unset HOMEBREW_GITHUB_API_TOKEN HOMEBREW_TAP_GITHUB_TOKEN
          scripts/fetch-public-release-witness.sh \
            "$GITHUB_REPOSITORY" "$RELEASE_ID" "$PUBLIC_VERIFIER_RUN_ID" \
            "$RUNNER_TEMP/public-witness"

      - name: Freeze public witness for native jobs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: homebrew-public-witness-${{ github.run_id }}
          path: ${{ runner.temp }}/public-witness
          if-no-files-found: error
          overwrite: true
          retention-days: 30

  verify:
    name: verify-${{ matrix.arch }}
    needs: public-witness-preflight
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    steps:

      - name: Check out protected release verifier
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.verifier_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go for build-info inspection
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Download frozen anonymous public witness
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: homebrew-public-witness-${{ github.run_id }}
          path: ${{ runner.temp }}/public-witness

      - name: Preserve pinned release tools in the frozen verifier path
        shell: bash
        run: |
          set -euo pipefail
          tools="$RUNNER_TEMP/release-tools"
          mkdir -m 700 "$tools"
          brew_path=$(command -v brew)
          curl_path=$(command -v curl)
          printf '%s\n' '#!/bin/bash' "exec \"$brew_path\" \"\$@\"" >"$tools/brew"
          # Native verification consumes this witness before any candidate
          # execution. A separate clean job owns every post-candidate read.
          {
            printf '%s\n' '#!/bin/bash' 'set -euo pipefail'
            printf 'curl_bin=%q\n' "$curl_path"
            cat <<'CURL_WRAPPER'
          public_url=
          for arg in "$@"; do
            case "$arg" in
              https://api.github.com/*) public_url=$arg ;;
            esac
          done
          if [[ -n "$public_url" && -n "${CRABBOX_PUBLIC_WITNESS_DIR:-}" ]]; then
            witness=$CRABBOX_PUBLIC_WITNESS_DIR
            [[ -d "$witness" && ! -L "$witness" ]]
            (cd "$witness" && shasum -a 256 -c manifest.sha256 >/dev/null)
            workflow_id=$(jq -er '.workflow_id | select(type == "number" and . > 0)' \
              "$witness/run.json")
            base="https://api.github.com/repos/$GITHUB_REPOSITORY"
            case "$public_url" in
              "$base/releases/$RELEASE_ID") witness_file=release.json ;;
              "$base/actions/runs/$PUBLIC_VERIFIER_RUN_ID") witness_file=run.json ;;
              "$base/actions/workflows/$workflow_id") witness_file=workflow.json ;;
              "$base/actions/runs/$PUBLIC_VERIFIER_RUN_ID/artifacts?per_page=100") \
                witness_file=artifacts.json ;;
              *) echo "unexpected public witness URL: $public_url" >&2; exit 1 ;;
            esac
            cat "$witness/$witness_file"
            exit 0
          fi
          exec "$curl_bin" "$@"
          CURL_WRAPPER
          } >"$tools/curl"
          chmod 700 "$tools/brew" "$tools/curl"
          ln -s "$(command -v go)" "$tools/go"
          printf '%s\n' "$tools" >>"$GITHUB_PATH"

      - name: Download frozen public release assets
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          VERIFIER_COMMIT: ${{ inputs.verifier_commit }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$VERIFIER_COMMIT"
          version=${RELEASE_TAG#v}
          assets=(
            checksums.txt
            provenance.json
            "crabbox_${version}_darwin_amd64.tar.gz"
            "crabbox_${version}_darwin_arm64.tar.gz"
            "crabbox_${version}_linux_amd64.tar.gz"
            "crabbox_${version}_linux_arm64.tar.gz"
            "crabbox_${version}_windows_amd64.zip"
            "crabbox_${version}_windows_arm64.zip"
          )
          assets_dir="$RUNNER_TEMP/release-assets"
          mkdir -m 700 "$assets_dir"
          for asset in "${assets[@]}"; do
            curl --fail --location --retry 3 --silent --show-error \
              --output "$assets_dir/$asset" \
              "https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/$asset"
          done

      - name: Download immutable native proof ZIPs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_VERIFIER_RUN_ID: ${{ inputs.public_verifier_run_id }}
        run: |
          set -euo pipefail
          proofs_dir="$RUNNER_TEMP/public-proofs"
          mkdir -m 700 "$proofs_dir"
          metadata="$RUNNER_TEMP/public-proof-artifacts.json"
          gh api --method GET \
            "repos/$GITHUB_REPOSITORY/actions/runs/$PUBLIC_VERIFIER_RUN_ID/artifacts?per_page=100" \
            >"$metadata"
          for arch in arm64 x86_64; do
            artifact_id=$(jq -er --arg name "verified-assets-$arch" '
              [.artifacts[] | select(.name == $name)] |
              if length == 1 then .[0].id else error("ambiguous proof artifact") end
            ' "$metadata")
            gh api --method GET --header 'Accept: application/vnd.github+json' \
              "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" \
              >"$proofs_dir/verified-assets-$arch.zip"
          done

      - name: Verify public Homebrew install without credentials
        shell: bash
        env:
          CRABBOX_HOMEBREW_EXTERNAL_PUBLIC_POSTFLIGHT: "1"
          CRABBOX_PUBLIC_WITNESS_DIR: ${{ runner.temp }}/public-witness
          RELEASE_ID: ${{ inputs.release_id }}
          RELEASE_TAG: ${{ inputs.tag }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          TAG_OBJECT: ${{ inputs.tag_object }}
          PUBLIC_VERIFIER_RUN_ID: ${{ inputs.public_verifier_run_id }}
          VERIFIER_COMMIT: ${{ inputs.verifier_commit }}
        run: |
          set -euo pipefail
          unset ACTIONS_ID_TOKEN_REQUEST_TOKEN ACTIONS_RUNTIME_TOKEN GH_TOKEN GITHUB_TOKEN
          unset HOMEBREW_GITHUB_API_TOKEN HOMEBREW_TAP_GITHUB_TOKEN
          HOMEBREW_NO_AUTO_UPDATE=1 brew tap openclaw/tap
          scripts/verify-homebrew-release.sh \
            "$RELEASE_TAG" "$RUNNER_TEMP/release-assets" \
            "$TAG_OBJECT" "$SOURCE_COMMIT" "$VERIFIER_COMMIT" \
            "$RELEASE_ID" "$PUBLIC_VERIFIER_RUN_ID" "$RUNNER_TEMP/public-proofs"

  public-witness-postflight:
    name: confirm-anonymous-public-witness
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out protected Homebrew workflow tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Download preflight public witness
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: homebrew-public-witness-${{ github.run_id }}
          path: ${{ runner.temp }}/public-witness-preflight

      - name: Confirm anonymous public metadata after native execution
        shell: bash
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          PUBLIC_VERIFIER_RUN_ID: ${{ inputs.public_verifier_run_id }}
        run: |
          set -euo pipefail
          unset ACTIONS_ID_TOKEN_REQUEST_TOKEN ACTIONS_RUNTIME_TOKEN GH_TOKEN GITHUB_TOKEN
          unset HOMEBREW_GITHUB_API_TOKEN HOMEBREW_TAP_GITHUB_TOKEN
          scripts/fetch-public-release-witness.sh \
            "$GITHUB_REPOSITORY" "$RELEASE_ID" "$PUBLIC_VERIFIER_RUN_ID" \
            "$RUNNER_TEMP/public-witness-postflight"
          for name in artifacts.json release.json run.json workflow.json manifest.sha256; do
            cmp "$RUNNER_TEMP/public-witness-preflight/$name" \
              "$RUNNER_TEMP/public-witness-postflight/$name"
          done
