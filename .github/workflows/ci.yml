name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GOFLAGS: -mod=readonly -trimpath
  GOTOOLCHAIN: local

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        shell: bash
        run: |
          mapfile -t files < <(git ls-files '*.go')
          if [ "${#files[@]}" -gt 0 ]; then
            diff="$(gofmt -l "${files[@]}")"
            if [ -n "$diff" ]; then
              echo "$diff"
              exit 1
            fi
          fi

      - name: Vet
        run: go vet ./...

      - name: Deadcode
        run: |
          output_file=$(mktemp)
          packages="$(go list ./... | grep -v '^github.com/openclaw/crabbox/mobile/go/crabboxmobile$')"
          go run golang.org/x/tools/cmd/deadcode@v0.45.0 -test $packages > "$output_file"
          if [ -s "$output_file" ]; then
            cat "$output_file"
            exit 1
          fi

      - name: Test
        run: go test -race ./...

      - name: Test all Go modules
        run: scripts/test-go-modules.sh

      - name: Coverage
        run: scripts/check-go-coverage.sh 90.0

      - name: Build
        run: go build -trimpath -o /tmp/crabbox ./cmd/crabbox

  apple-vz:
    name: Apple VZ
    runs-on: macos-15
    timeout-minutes: 15
    env:
      CGO_CFLAGS: -mmacosx-version-min=13.0
      CGO_LDFLAGS: -mmacosx-version-min=13.0
      MACOSX_DEPLOYMENT_TARGET: "13.0"

    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify Apple Silicon runner
        run: test "$(uname -m)" = arm64

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Vet native helper
        run: go vet ./internal/applevzhelper ./cmd/crabbox-apple-vz-helper

      - name: Test native helper and provider
        run: go test -race ./internal/applevzhelper ./internal/providers/applevz

      - name: Build native helper
        run: go build -trimpath -o /tmp/crabbox-apple-vz-helper ./cmd/crabbox-apple-vz-helper

      - name: Verify native helper deployment target
        run: |
          minos="$(vtool -show-build /tmp/crabbox-apple-vz-helper | awk '$1 == "minos" { print $2; exit }')"
          test "$minos" = "13.0"

  worker:
    name: Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install
        run: npm ci
        working-directory: worker

      - name: Format
        run: npm run format:check
        working-directory: worker

      - name: Lint
        run: npm run lint
        working-directory: worker

      - name: Typecheck
        run: npm run check
        working-directory: worker

      - name: Typecheck Node runtime
        run: npm run check:node
        working-directory: worker

      - name: Test
        run: npm test
        working-directory: worker

      - name: Build
        run: npm run build
        working-directory: worker

      - name: Build Cloudflare Dynamic Workers
        run: npm run build:cloudflare-dynamic-workers
        working-directory: worker

      - name: Build Node runtime
        run: npm run build:node
        working-directory: worker

      - name: Check runtime base image pins
        run: node scripts/check-docker-base-images.mjs

      - name: Build Node runtime image
        run: docker build -f worker/Dockerfile.node worker

  mobile:
    name: Mobile (CrabboxKit + e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Swift
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2
        with:
          swift-version: "6.0"

      - name: Build CrabboxKit + headless e2e
        run: swift build
        working-directory: mobile

      - name: Unit tests
        run: swift test
        working-directory: mobile

      - name: Headless e2e (17 scenarios / 13 invariants, deterministic)
        run: swift run crabbox-sim --json
        working-directory: mobile

  mobile-ios:
    name: Mobile (iOS app build)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate
        working-directory: mobile

      - name: Build iOS app (build-only, unsigned)
        working-directory: mobile
        run: |
          xcodebuild \
            -project Crabbox.xcodeproj \
            -scheme Crabbox \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

  scripts:
    name: Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install script dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Test
        run: node --test scripts/*.test.js

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Check docs
        run: scripts/check-docs.sh

  release-check:
    name: Release Check
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Verify Apple Silicon runner
        run: test "$(uname -m)" = arm64

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Snapshot release build
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish --parallelism 1

      - name: Verify snapshot helper deployment target
        run: |
          helper="$(find dist -type f -name crabbox-apple-vz-helper -print -quit)"
          if [ -z "$helper" ] || [ ! -x "$helper" ]; then
            echo "::error::snapshot Apple VZ helper not found"
            exit 1
          fi
          minos="$(vtool -show-build "$helper" | awk '$1 == "minos" { print $2; exit }')"
          if [ "$minos" != "13.0" ]; then
            echo "::error::Apple VZ helper minimum macOS is $minos, expected 13.0"
            exit 1
          fi
